<!DOCTYPE html>
<html>
  <head>
    <title>Dashboard</title>
    <style>
      body {
        background: #121212;
        color: white;
        font-family: Arial;
        text-align: center;
        padding: 40px;
      }

      .card {
        display: inline-block;
        background: #1f1f1f;
        padding: 30px;
        margin: 20px;
        border-radius: 10px;
        width: 200px;
        font-size: 20px;
      }

      button {
        padding: 10px 20px;
        background: #333;
        color: white;
        border: none;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h2>Application Dashboard</h2>

    <div class="card">Total<br /><span id="total"></span></div>
    <div class="card">Interview<br /><span id="interview"></span></div>
    <div class="card">Selected<br /><span id="selected"></span></div>
    <div class="card">Rejected<br /><span id="rejected"></span></div>

    <br /><br />
    <button onclick="location.href='index.html'">Back</button>

    <script>
      let applications = JSON.parse(localStorage.getItem("applications")) || [];

      document.getElementById("total").innerText = applications.length;
      document.getElementById("interview").innerText = applications.filter(
        (a) => a.status === "Interview"
      ).length;
      document.getElementById("selected").innerText = applications.filter(
        (a) => a.status === "Selected"
      ).length;
      document.getElementById("rejected").innerText = applications.filter(
        (a) => a.status === "Rejected"
      ).length;
    </script>
  </body>
</html>
